    setErr('');
    if (pw !== pw2) return setErr('Şifreler eşleşmiyor');
    if (pw.length < 6) return setErr('Şifre en az 6 karakter olmalı');
    setLoading(true);
    const { data, error } = await sb.auth.signUp({ email, password: pw });
    setLoading(false);
    if (error) {
      if (error.message.includes('rate limit')) setErr('Çok fazla deneme, 1 saat bekle veya farklı e-posta kullan.');
      else if (error.message.includes('already registered')) setErr('Bu e-posta kayıtlı, Giriş Yap sekmesini kullan.');
      else setErr(error.message);
    } else if (data.session) setOk('✅ Kayıt başarılı! Giriş yapılıyor...');
    else setOk('✅ Kayıt başarılı! E-postana doğrulama maili gönderildi.');
  };
  const sendReset = async () => {
    setErr(''); setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://yalify.app' });
    setLoading(false);
    if (error) setErr(error.message);
    else setOk('✅ Sıfırlama linki e-postana gönderildi.');
  };

  /* ── DATA ── */
  const OZELLIKLER = [
    { icon:'📦', baslik:'Ürün Takibi', acik:'Test aşamasındaki ürünleri durumlarıyla (Araştırma → Test → Kazanıyor) takip et. Hangi ürünün değer taşıdığını tek bakışta gör.' },
    { icon:'⚖️', baslik:'Başabaş Hesaplama', acik:'Shopify komisyonu, kargo, reklam, ödeme gateway ücretleri dahil gerçek başabaş noktanı hesapla. Kaç satışta kâra geçeceğini anında bil.' },
    { icon:'💰', baslik:'Kâr Takibi', acik:'Her siparişi ekle, net kârını ve marjını otomatik hesapla. Sipariş geçmişini düzenle, CSV olarak indir, en kârlı ürünleri sırala.' },
    { icon:'📊', baslik:'Analitik Dashboard', acik:'Günlük kâr trendi grafiği, kümülatif kazanç, en kârlı 5 sipariş listesi. Haftalık, aylık veya tüm zamanlar filtresiyle analiz et.' },
    { icon:'🏦', baslik:'Bütçe & Tasarruf', acik:'Her günün kârından otomatik %20 tasarruf ayır. Reklam ve tedarik harcamalarını kaydet, kalan bütçeni gerçek zamanlı takip et.' },
    { icon:'🔑', baslik:'Ads Keyword Havuzu', acik:'200+ hazır Facebook/Meta reklam keyword\'ü. Kategori bazlı filtrele, tek tıkla kopyala. Reklam kurulumunu dakikalara indir.' },
  ];
  const STATS = [
    { deger:'6', label:'Güçlü araç', alt:'tek platformda' },
    { deger:'%20', label:'Otomatik tasarruf', alt:'her günkü kârdan' },
    { deger:'200+', label:'Hazır keyword', alt:'Facebook reklamları için' },
    { deger:'3 gün', label:'Ücretsiz deneme', alt:'kredi kartı gerekmez' },
  ];
  const YORUMLAR = [
    { isim:'Mert A.', sure:'3 aydır kullanıyor', yıldız:5, metin:'"Başabaş hesaplamak için Excel\'de saatler harcıyordum. Şimdi saniyeler içinde her ürünün gerçek marjını görüyorum. Özellikle kargo ve Shopify komisyonunu otomatik eklemesi muhteşem."' },
    { isim:'Selin K.', sure:'5 aydır kullanıyor', yıldız:5, metin:'"Bütçe takibi özelliği oyun değiştirdi. Hangi gün ne kadar harcadığımı, ne kadar tasarruf ettiğimi net görüyorum. Artık sürpriz zararlarla karşılaşmıyorum."' },
    { isim:'Emre T.', sure:'2 aydır kullanıyor', yıldız:5, metin:'"Analitik sayfası çok işime yarıyor — hangi ürünün en çok kâr getirdiğini sırayla görünce odaklanmak çok kolaylaştı. Üstelik tamamen Türkçe olması büyük artı."' },
    { isim:'Büşra Y.', sure:'1 aydır kullanıyor', yıldız:5, metin:'"Ads keyword havuzu başlı başına değer. 200+ hazır kelimeyi kategoriye göre filtreleyip tek tıkla kopyalayabilmek reklam kurulum süremdeki en büyük vakit tasarrufu."' },
  ];
  const KARSILASTIRMA = [
    { ozellik:'Başabaş hesaplama', excel:'Manuel formül', diger:'Yok', yalify:'✅ Otomatik' },
    { ozellik:'Kargo + TX ücretleri', excel:'Elle girmek gerekir', diger:'Kısmi', yalify:'✅ Dahil' },
    { ozellik:'Sipariş geçmişi', excel:'Kısmi', diger:'✅', yalify:'✅ Düzenle/Sil' },
    { ozellik:'Kâr grafiği', excel:'❌', diger:'Kısmi', yalify:'✅ Günlük + Kümülatif' },
    { ozellik:'%20 tasarruf kuralı', excel:'❌', diger:'❌', yalify:'✅ Otomatik' },
    { ozellik:'Ads keyword havuzu', excel:'❌', diger:'❌', yalify:'✅ 200+ hazır' },
    { ozellik:'Mobil uyum', excel:'❌', diger:'Kısmi', yalify:'✅ Tam mobil' },
    { ozellik:'Fiyat', excel:'Ücretsiz', diger:'$30-100/ay', yalify:'$10/ay' },
  ];
  const ADIMLAR = [
    { no:'01', baslik:'Kayıt Ol', acik:'E-posta ve şifrenle 30 saniyede kayıt ol. Kredi kartı bilgisi gerekmez. 3 günlük ücretsiz deneme otomatik başlar.' },
    { no:'02', baslik:'Ürünlerini Ekle', acik:'Test ettiğin ürünleri ekle. Maliyet, kargo ve platform bilgilerini gir — başabaş noktanı ve gerçek marjını anında hesapla.' },
    { no:'03', baslik:'Kârını Takip Et', acik:'Her satışı kaydet, günlük kârını gir, analitik panosunu izle. Hangi ürün kazanıyor, hangisi kaybettiriyor — net olarak gör.' },
  ];
  const SSS = [
    { s:'Ücretsiz deneme ne kadar sürer?', c:'3 gün ücretsiz kullanabilirsin. Deneme süresince tüm özelliklere tam erişim var. Süre bittiğinde $10/ay abonelikle devam edebilirsin.' },
    { s:'Hangi platformlarla çalışır?', c:'Shopify, WooCommerce ve diğer dropshipping platformlarıyla uyumludur. Komisyon oranlarını platforma göre düzenleyebilirsin.' },
    { s:'Verilerim güvende mi?', c:'Tüm veriler Supabase altyapısında güvenli biçimde saklanır. Hesabın silindiğinde tüm verilerin de silinir.' },
    { s:'Aboneliği istediğim zaman iptal edebilir miyim?', c:'Evet, istediğin zaman Stripe üzerinden aboneliğini iptal edebilirsin. İptal anında abonelik sona erer, para iadesi yapılmaz.' },
    { s:'Mobilde çalışıyor mu?', c:'Evet, Yalify tamamen mobil uyumludur. iPhone ve Android tarayıcılarda sorunsuz çalışır, ayrıca "Ana Ekrana Ekle" ile uygulama gibi kullanılabilir.' },
    { s:'Kredi kartı bilgisi girmeden deneyebilir miyim?', c:'Evet. Kayıt sırasında hiçbir ödeme bilgisi istenmez. 3 günlük deneme tamamen ücretsizdir.' },
  ];

  /* ── AUTH MODAL ── */
  const AuthModal = showAuth && (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{background:'rgba(15,23,42,0.6)'}}>
      <div className="bg-white w-full sm:rounded-2xl sm:max-w-md rounded-t-2xl shadow-2xl overflow-y-auto" style={{maxHeight:'92vh'}}>
        <div className="flex justify-between items-center px-6 pt-5 pb-0">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center"><span className="text-white font-black text-sm">Y</span></div>
            <span className="font-black text-slate-800">Yalify</span>
          </div>
          <button onClick={() => setShowAuth(false)} className="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
        </div>
        {mod !== 'forgot' && (
          <div className="flex mx-6 mt-4 bg-slate-100 rounded-xl p-1">
            {[['register','Kayıt Ol'],['login','Giriş Yap']].map(([m,l]) => (
              <button key={m} onClick={() => { setMod(m); setErr(''); setOk(''); }}
                className={`flex-1 py-2 rounded-lg text-sm font-bold transition ${mod===m ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>{l}</button>
            ))}
          </div>
        )}
        <div className="p-6 space-y-4">
          {mod === 'forgot' && <div><h3 className="text-base font-black text-slate-800">Şifremi Unuttum</h3><p className="text-xs text-slate-500 mt-0.5">E-posta adresini gir, sıfırlama linkini gönderelim.</p></div>}
          {mod === 'register' && <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-center"><p className="text-sm font-bold text-indigo-700">🎉 {TRIAL_DAYS} gün ücretsiz dene!</p><p className="text-xs text-indigo-500 mt-0.5">Kredi kartı gerekmez</p></div>}
          <Field label="E-posta"><input type="email" value={email} onChange={e => setEmail(e.target.value)} className="inp" placeholder="ornek@email.com" autoComplete="email" /></Field>
          {mod !== 'forgot' && <Field label="Şifre"><input type="password" value={pw} onChange={e => setPw(e.target.value)} className="inp" placeholder="••••••••" autoComplete={mod==='login'?'current-password':'new-password'} onKeyDown={e => e.key==='Enter' && mod==='login' && login()} /></Field>}
          {mod === 'register' && <Field label="Şifre Tekrar"><input type="password" value={pw2} onChange={e => setPw2(e.target.value)} className="inp" placeholder="••••••••" onKeyDown={e => e.key==='Enter' && register()} /></Field>}
          {err && <p className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{err}</p>}
          {ok  && <p className="text-xs text-emerald-600 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">{ok}</p>}
          {mod === 'forgot' ? (
            <><button onClick={sendReset} disabled={loading} className="btn-primary flex items-center justify-center gap-2">{loading && <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin"/>}Sıfırlama Maili Gönder</button><button onClick={() => { setMod('login'); setErr(''); setOk(''); }} className="w-full text-center text-xs text-indigo-500 font-semibold mt-1">← Giriş Yap'a dön</button></>
          ) : (
            <><button onClick={mod==='login'?login:register} disabled={loading} className="btn-primary flex items-center justify-center gap-2">{loading && <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin"/>}{mod==='login'?'Giriş Yap':`Ücretsiz Başla (${TRIAL_DAYS} gün)`}</button>{mod==='login' && <button onClick={() => { setMod('forgot'); setErr(''); setOk(''); }} className="w-full text-right text-xs text-slate-400 hover:text-indigo-500 mt-0.5">Şifremi unuttum?</button>}</>
          )}
        </div>
        <p className="text-center text-xs text-slate-400 pb-5 px-6">Devam ederek <a href="/terms.html" target="_blank" className="underline">Kullanım Şartlarını</a> ve <a href="/privacy.html" target="_blank" className="underline">Gizlilik Politikasını</a> kabul etmiş olursunuz</p>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-white">
      {AuthModal}

      {/* ══════ NAVBAR ══════ */}
      <nav className={`fixed top-0 left-0 right-0 z-40 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-100' : 'bg-transparent'}`}>
        <div className="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${scrolled ? 'bg-indigo-600' : 'bg-white'}`}>
              <span className={`font-black text-sm ${scrolled ? 'text-white' : 'text-indigo-600'}`}>Y</span>
            </div>
            <span className={`font-black text-base ${scrolled ? 'text-slate-800' : 'text-white'}`}>Yalify</span>
          </div>
          <div className={`hidden md:flex items-center gap-6 text-sm font-semibold ${scrolled ? 'text-slate-600' : 'text-white/80'}`}>
            <a href="#ozellikler" className="hover:text-indigo-500 transition">Özellikler</a>
            <a href="#nasil-calisir" className="hover:text-indigo-500 transition">Nasıl Çalışır</a>
            <a href="#fiyat" className="hover:text-indigo-500 transition">Fiyat</a>
            <a href="#sss" className="hover:text-indigo-500 transition">SSS</a>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => openModal('login')} className={`text-sm font-semibold px-4 py-2 rounded-xl transition ${scrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/80 hover:text-white'}`}>Giriş Yap</button>
            <button onClick={() => openModal('register')} className="text-sm font-bold px-4 py-2 rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 transition shadow-sm">Ücretsiz Başla</button>
          </div>
        </div>
      </nav>

      {/* ══════ HERO ══════ */}
      <section style={{background:'linear-gradient(135deg,#667eea 0%,#764ba2 55%,#06b6d4 100%)'}} className="pt-24 pb-20 px-5">
        <div className="max-w-4xl mx-auto text-center">
          <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/15 border border-white/25 text-white/90 text-xs font-bold mb-6">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"></span>
            3 gün ücretsiz · Kredi kartı gerekmez
          </div>
          <h1 className="text-4xl sm:text-5xl lg:text-6xl font-black text-white leading-tight mb-6">
            Dropshipping kârını<br />
            <span className="text-yellow-300">gerçekten</span> biliyor musun?
          </h1>
          <p className="text-white/75 text-lg sm:text-xl leading-relaxed max-w-2xl mx-auto mb-8">
            Ürün maliyeti, kargo, Shopify komisyonu, reklam, iade — hepsini tek platformda hesapla.
            Günlük net kârını takip et, bütçeni yönet, doğru kararları ver.
          </p>
          <div className="flex flex-col sm:flex-row items-center justify-center gap-3 mb-14">
            <button onClick={() => openModal('register')} className="w-full sm:w-auto px-8 py-3.5 bg-white text-indigo-700 font-black rounded-2xl text-base hover:bg-indigo-50 transition shadow-xl">
              Ücretsiz Başla — 3 Gün
            </button>
            <button onClick={() => openModal('login')} className="w-full sm:w-auto px-8 py-3.5 bg-white/10 border border-white/30 text-white font-bold rounded-2xl text-base hover:bg-white/20 transition">
              Giriş Yap
            </button>
          </div>
          {/* Stats bar */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 max-w-2xl mx-auto">
            {STATS.map(s => (
              <div key={s.label} className="rounded-2xl p-4" style={{background:'rgba(255,255,255,0.12)'}}>
                <p className="text-2xl font-black text-white">{s.deger}</p>
                <p className="text-white/90 text-xs font-bold mt-0.5">{s.label}</p>
                <p className="text-white/50 text-xs mt-0.5">{s.alt}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══════ ÖZELLİKLER ══════ */}
      <section id="ozellikler" className="py-20 px-5 bg-slate-50">
        <div className="max-w-5xl mx-auto">
          <div className="text-center mb-12">
            <p className="text-indigo-600 text-xs font-black uppercase tracking-widest mb-2">Platform</p>
            <h2 className="text-3xl sm:text-4xl font-black text-slate-800">Kazanmak için ihtiyacın olan her şey</h2>
            <p className="text-slate-500 mt-3 text-lg max-w-xl mx-auto">Dropshipping işini büyütmek için tasarlanmış 6 güçlü araç, tek platformda.</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {OZELLIKLER.map((o, i) => (
              <div key={o.baslik} className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all">
                <div className="w-11 h-11 bg-indigo-50 rounded-xl flex items-center justify-center mb-4 text-2xl">{o.icon}</div>
                <h3 className="font-black text-slate-800 text-base mb-2">{o.baslik}</h3>
                <p className="text-slate-500 text-sm leading-relaxed">{o.acik}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══════ NASIL ÇALIŞIR ══════ */}
      <section id="nasil-calisir" className="py-20 px-5 bg-white">
        <div className="max-w-5xl mx-auto">
          <div className="text-center mb-14">
            <p className="text-indigo-600 text-xs font-black uppercase tracking-widest mb-2">Süreç</p>
            <h2 className="text-3xl sm:text-4xl font-black text-slate-800">Üç adımda başla</h2>
            <p className="text-slate-500 mt-3 text-lg">Kayıt olmaktan ilk kâr analizine kadar sadece birkaç dakika.</p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            {ADIMLAR.map((a, i) => (
              <div key={a.no} className="relative text-center md:text-left">
                {i < 2 && <div className="hidden md:block absolute top-8 left-full w-full h-px border-t-2 border-dashed border-indigo-200 -ml-4 z-0" style={{width:'calc(100% - 2rem)'}}></div>}
                <div className="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center mx-auto md:mx-0 mb-4 relative z-10">
                  <span className="text-white font-black text-lg">{a.no}</span>
                </div>
                <h3 className="font-black text-slate-800 text-lg mb-2">{a.baslik}</h3>
                <p className="text-slate-500 text-sm leading-relaxed">{a.acik}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══════ KARŞILAŞTIRMA TABLOSU ══════ */}
      <section className="py-20 px-5 bg-slate-50">
        <div className="max-w-4xl mx-auto">
          <div className="text-center mb-12">
            <p className="text-indigo-600 text-xs font-black uppercase tracking-widest mb-2">Karşılaştırma</p>
            <h2 className="text-3xl sm:text-4xl font-black text-slate-800">Yalify vs Diğerleri</h2>
            <p className="text-slate-500 mt-3 text-lg">Neden Excel veya genel araçlar yeterli değil?</p>
          </div>
          <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="bg-slate-50 border-b border-slate-200">
                    <th className="text-left px-5 py-4 text-xs font-black text-slate-500 uppercase tracking-widest">Özellik</th>
                    <th className="text-center px-4 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Excel</th>
                    <th className="text-center px-4 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">Diğer Araçlar</th>
                    <th className="text-center px-4 py-4 text-xs font-black text-indigo-600 uppercase tracking-widest bg-indigo-50">Yalify</th>
                  </tr>
                </thead>
                <tbody>
                  {KARSILASTIRMA.map((r, i) => (
                    <tr key={r.ozellik} className={`border-b border-slate-100 ${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}`}>
                      <td className="px-5 py-3.5 text-sm font-semibold text-slate-700">{r.ozellik}</td>
                      <td className="px-4 py-3.5 text-center text-sm text-slate-400">{r.excel}</td>
                      <td className="px-4 py-3.5 text-center text-sm text-slate-400">{r.diger}</td>
                      <td className="px-4 py-3.5 text-center text-sm font-bold text-indigo-600 bg-indigo-50/40">{r.yalify}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      {/* ══════ YORUMLAR ══════ */}
      <section className="py-20 px-5 bg-white">
        <div className="max-w-5xl mx-auto">
          <div className="text-center mb-12">
            <p className="text-indigo-600 text-xs font-black uppercase tracking-widest mb-2">Kullanıcılar</p>
            <h2 className="text-3xl sm:text-4xl font-black text-slate-800">Kullananlar ne diyor?</h2>
            <div className="flex items-center justify-center gap-1.5 mt-3">
              <span className="text-yellow-400 text-lg">★★★★★</span>
              <span className="text-slate-600 font-bold text-sm">4.9/5</span>
              <span className="text-slate-400 text-sm">· Kullanıcı yorumları</span>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
            {YORUMLAR.map(y => (
              <div key={y.isim} className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                <div className="text-yellow-400 text-base mb-3">{'★'.repeat(y.yıldız)}</div>
                <p className="text-slate-700 text-sm leading-relaxed italic mb-4">{y.metin}</p>
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-sm">{y.isim[0]}</div>
                  <div>
                    <p className="font-bold text-slate-800 text-sm">{y.isim}</p>
                    <p className="text-slate-400 text-xs">{y.sure}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══════ FİYATLANDIRMA ══════ */}
      <section id="fiyat" className="py-20 px-5 bg-slate-50">
        <div className="max-w-3xl mx-auto">
          <div className="text-center mb-12">
            <p className="text-indigo-600 text-xs font-black uppercase tracking-widest mb-2">Fiyatlandırma</p>
            <h2 className="text-3xl sm:text-4xl font-black text-slate-800">Basit, şeffaf fiyat</h2>
            <p className="text-slate-500 mt-3 text-lg">Gizli ücret yok. İptal etmek her zaman ücretsiz.</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 max-w-2xl mx-auto">

/* ═══════════════════════════════════
   ROOT APP — AUTH STATE MACHINE
═══════════════════════════════════ */
function App() {
  const [authState, setAuthState] = useState(INITIAL_IS_RECOVERY ? 'recovery' : 'loading');
  const authStateRef = useRef(INITIAL_IS_RECOVERY ? 'recovery' : 'loading');
  const setAuthStateBoth = s => { authStateRef.current = s; setAuthState(s); };
  const [user, setUser]     = useState(null);
  const [profile, setProfile] = useState(null);

  const loadProfile = async (uid, email) => {
    try {
      let { data } = await sb.from('profiles').select('*').eq('id', uid).single();
      if (!data) {
        await sb.from('profiles').insert({ id: uid, email: email || '', trial_started_at: new Date().toISOString(), subscription_status: 'trial' });
        const res = await sb.from('profiles').select('*').eq('id', uid).single();
        data = res.data;
      }
      setProfile(data || { id: uid, email: email || '', trial_started_at: new Date().toISOString(), subscription_status: 'trial' });
    } catch(e) {
      setProfile({ id: uid, email: email || '', trial_started_at: new Date().toISOString(), subscription_status: 'trial' });
    }
  };

  useEffect(() => {
    // Listener'ı getSession'dan ÖNCE kur — PASSWORD_RECOVERY yakalamak için
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') { setAuthStateBoth('recovery'); return; }
      if (authStateRef.current === 'recovery') return;
      if (session) { setUser(session.user); loadProfile(session.user.id, session.user.email); setAuthStateBoth('authed'); }
      else { setUser(null); setProfile(null); setAuthStateBoth('guest'); }
    });

    // Hash veya query'de recovery token var mı kontrol et
    const url = window.location.href;
    if (url.includes('type=recovery') || url.includes('type%3Drecovery')) {
      setAuthStateBoth('recovery');
    } else {
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) { setUser(session.user); loadProfile(session.user.id, session.user.email); setAuthStateBoth('authed'); }
        else setAuthStateBoth('guest');
      });
    }
    return () => subscription.unsubscribe();
  }, []);

  const signOut = () => { setAuthStateBoth('guest'); sb.auth.signOut(); };

  if (authState === 'loading')   return <LoadingScreen />;
  if (authState === 'recovery')  return <ResetPasswordScreen />;
  if (authState === 'guest')     return <LandingPage />;

  const trialInfo = getTrialInfo(profile);
  if (trialInfo.status === 'expired') return <PaywallScreen user={user} onSignOut={signOut} />;

  return <MainApp user={user} profile={profile} setProfile={setProfile} trialInfo={trialInfo} onSignOut={signOut} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
